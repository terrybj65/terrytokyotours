  <style>
    :root {
      --ink: #1a1612;
      --paper: #f5f0e8;
      --red: #c0392b;
      --gold: #b8952a;
      --muted: #7a7068;
      --border: rgba(26,22,18,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    

    

    

    

    .hero h1 {
      position: relative;
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      font-weight: 800;
      color: #fff;
      line-height: 0.9;
      margin-bottom: 1.8rem;
    }

    .hero h1 span {
      display: block;
      font-size: 0.38em;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.08em;
      margin-top: 0.6rem;
    }

    

    

    

    

    @keyframes scrollline {
      0%, 100% { opacity: 0.25; transform: scaleY(1); }
      50% { opacity: 0.6; transform: scaleY(0.6); }
    }

    /* ── NAV / INTRO ── */
    .intro {
      max-width: 820px;
      margin: 5rem auto;
      padding: 0 6vw;
      text-align: center;
    }

    .intro p {
      font-size: 1.15rem;
      line-height: 1.85;
      color: var(--muted);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin: 3.5rem 6vw;
      color: var(--gold);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── STOPS ── */
    .stops {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 6vw 8rem;
    }

    .stop {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-top: 1px solid var(--border);
      padding: 4rem 0;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .stop.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .stop:nth-child(even) {
      direction: rtl;
    }

    .stop:nth-child(even) > * {
      direction: ltr;
    }

    .stop-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
    }

    .stop-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 👈 Add this line right here */
  transition: transform 0.7s ease;
}

    .stop:hover .stop-img-wrap img {
      transform: scale(1.04);
    }

    .stop-num {
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      font-family: 'Shippori Mincho', serif;
      font-size: 4rem;
      font-weight: 800;
      color: rgba(255,255,255,0.18);
      line-height: 1;
      pointer-events: none;
    }

    .stop-content {
      padding: 3rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stop-category {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1rem;
    }

    .stop-title {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .stop-jp {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.6rem;
      letter-spacing: 0.06em;
    }

    .stop-desc {
      font-size: 0.95rem;
      line-height: 1.85;
      color: #4a443c;
      margin-bottom: 1.8rem;
    }

    .stop-tip {
      border-left: 2px solid var(--gold);
      padding-left: 1rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.6;
    }

    .stop-rating {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .stars {
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* ── MAP LINK ── */
    .stop-map {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.8rem;
      font-size: 0.78rem;
      color: var(--red);
      text-decoration: none;
      letter-spacing: 0.05em;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .stop-map:hover { opacity: 0.7; }

    /* ── FOOTER ── */
    

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .stop {
        grid-template-columns: 1fr;
        direction: ltr !important;
      }
      .stop-content { padding: 2rem 0; }
      .stop:nth-child(even) > * { direction: ltr; }
    }
  
  /* ── HERO ── */
  .hero {
    position: relative;
    height: 50vh;
    min-height: 560px;
    overflow: hidden;
  }
  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: none;
    display: flex;
    align-items: center;
  }
  .hero-content {
    max-width: 560px;
    padding: 0 2rem;
    background: none;
  }

    letter-spacing: 0.12em;
