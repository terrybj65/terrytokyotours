<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shibuya — Tokyo's Most Exciting District | Tokyo Private Tours with Terry</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #14120e;
      --paper: #f0ede6;
      --moss: #1a4a6a;
      --sage: #255a80;
      --stone: #7a7468;
      --gold: #b07820;
      --border: rgba(20,18,14,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      height: 90vh;
      min-height: 560px;
      overflow: hidden;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
    }
    .hero-content {
      max-width: 560px;
      padding: 0 2rem;
      background: none;
    }
    .hero-eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f9a07a;
      margin-bottom: 1rem;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }
    .hero h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(40px, 6vw, 64px);
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 1rem;
      font-weight: 800;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.8);
    }
    .hero p {
      font-size: 17px;
      color: #ffffff;
      line-height: 1.7;
      margin-bottom: 2rem;
      max-width: 420px;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      background: #D00000;
      color: #fff;
      border: none;
      padding: 13px 26px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      display: inline-block;
    }
    .btn-primary:hover { background: #B00000; }
    .btn-ghost {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 13px 26px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      display: inline-block;
    }

    /* ── INTRO ── */
    .intro {
      max-width: 800px;
      margin: 5.5rem auto;
      padding: 0 6vw;
      text-align: center;
    }
    .intro-kicker {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 1.4rem;
    }
    .intro p {
      font-size: 1.12rem;
      line-height: 1.9;
      color: var(--stone);
    }

    /* time of day bar */
    .tod-bar {
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 6vw;
    }
    .tod-inner {
      display: flex;
      align-items: center;
      border: 1px solid rgba(26,74,106,0.18);
      overflow: hidden;
    }
    .tod-item {
      flex: 1;
      padding: 1.1rem 1.4rem;
      border-right: 1px solid rgba(26,74,106,0.18);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .tod-item:last-child { border-right: none; }
    .tod-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--moss);
    }
    .tod-value {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.4;
    }

    /* nav */
    .section-nav {
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 0 6vw;
    }
    .section-nav-inner {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: rgba(26,74,106,0.06);
      border: 1px solid rgba(26,74,106,0.18);
      border-left: 3px solid var(--moss);
      padding: 1.2rem 1.8rem;
      flex-wrap: wrap;
    }
    .nav-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--moss);
      flex-shrink: 0;
    }
    .nav-pills { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .nav-pill {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink);
      background: rgba(26,74,106,0.08);
      border: 1px solid rgba(26,74,106,0.2);
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.03em;
    }
    .nav-pill:hover { background: var(--moss); color: #fff; border-color: var(--moss); }

    .divider {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin: 0 6vw 3rem;
      color: var(--sage);
      font-size: 0.67rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── STOPS ── */
    .stops {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 6vw 8rem;
    }

    .stop {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
      padding: 4rem 0;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .stop.visible { opacity: 1; transform: translateY(0); }
    .stop:nth-child(even) { direction: rtl; }
    .stop:nth-child(even) > * { direction: ltr; }

    .stop-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
    }
    .stop-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.75s ease;
    }
    .stop:hover .stop-img-wrap img { transform: scale(1.05); }

    .stop-badge {
      position: absolute;
      bottom: 1.2rem; left: 1.2rem;
      background: rgba(6,12,20,0.75);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.82);
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      backdrop-filter: blur(6px);
    }

    .stop-time {
      position: absolute;
      top: 1rem; left: 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      background: rgba(6,12,20,0.55);
      padding: 0.2rem 0.6rem;
      backdrop-filter: blur(4px);
    }

    .stop-num {
      position: absolute;
      top: 1rem; right: 1.2rem;
      font-family: 'Shippori Mincho', serif;
      font-size: 4.5rem; font-weight: 800;
      color: rgba(255,255,255,0.13);
      line-height: 1; pointer-events: none;
    }

    .stop-content {
      padding: 2.8rem 3.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .stop-category {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--moss);
      margin-bottom: 1rem;
    }
    .stop-title {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(1.7rem, 2.8vw, 2.4rem);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.35rem;
    }
    .stop-jp {
      font-size: 0.82rem;
      color: var(--stone);
      margin-bottom: 1.6rem;
      letter-spacing: 0.06em;
    }
    .stop-desc {
      font-size: 0.94rem;
      line-height: 1.88;
      color: #3e3a34;
      margin-bottom: 1.6rem;
    }
    .stop-tip {
      border-left: 2px solid var(--gold);
      padding-left: 1rem;
      font-size: 0.82rem;
      color: var(--stone);
      font-style: italic;
      line-height: 1.65;
    }
    .stop-footer {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .stop-rating {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--stone);
    }
    .stars { color: var(--gold); }
    .stop-map {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.76rem;
      color: var(--moss);
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .stop-map:hover { opacity: 0.65; }

    /* ── FOOTER ── */
    footer { background: #f8f0e8; border-top: 4px solid #de1c24; padding: 2.5rem 2rem; font-size: 13px; }
    .footer-inner { max-width: 1100px; margin:
