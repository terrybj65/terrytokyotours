<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Availability — Tokyo Private Tours with Terry</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#D00000;--red-dark:#B00000;--red-light:#FFE5E5;
  --text:#1C2833;--text-muted:#5D6D7E;--border:rgba(0,0,0,0.1);
  --bg:#FAFAF8;--bg-card:#ffffff;--bg-surface:#F4F3EF;
  --radius:12px;--radius-sm:8px;
}
html{scroll-behavior:smooth;}html,body{overflow-x:hidden;}img,video{max-width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.6;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(250,250,248,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;}
.nav-logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-logo span{color:var(--red);}
.back-btn{font-size:14px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s;}
.back-btn:hover{color:var(--text);}

/* Section base */
.section-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:.5rem;}
.section-title{font-family:'DM Serif Display',serif;font-size:40px;font-weight:400;line-height:1.15;color:var(--text);margin-bottom:.75rem;}
.section-sub{font-size:17px;color:var(--text-muted);max-width:560px;}

/* CALENDAR STYLES */
.tcal-section{background:var(--bg);padding:5rem 0;}
.tcal-section .container{max-width:860px;margin:0 auto;padding:0 2rem;}
.tcal-wrap{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.07);overflow:hidden;margin-top:2rem;}
.tcal-bar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid var(--border);}
.tcal-month{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
.tcal-navbtn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s;}
.tcal-navbtn:hover{background:var(--bg-surface);border-color:var(--red);}
.tcal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg-surface);border-bottom:1px solid var(--border);}
.tcal-dow span{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);padding:8px 0;text-transform:uppercase;letter-spacing:.5px;}
.tcal-dow span:first-child{color:var(--red);}
.tcal-dow span:last-child{color:#1a5fa5;}
.tcal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.tc{min-height:70px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:6px;background:#fff;position:relative;overflow:hidden;}
.tc:nth-child(7n){border-right:none;}
.tc.clickable{cursor:pointer;}
.tc.clickable:hover{background:#fff8f8;}
.tc.dim{opacity:.25;pointer-events:none;}
.tc.past{background:#fafafa;cursor:default;}
.tc.past .tcn{color:#ccc;}
.tc.istoday{box-shadow:inset 0 0 0 2px #999;}
.tc.ishol{background:#fff5f7;}
.tc.sel{box-shadow:inset 0 0 0 2.5px var(--red);background:#fff3f3;}
.tcn{font-size:13px;font-weight:500;color:var(--text);display:block;line-height:1;}
.tc.sun .tcn{color:var(--red);}
.tc.sat .tcn{color:#1a5fa5;}
.tchn{font-size:8px;color:var(--red);font-weight:600;display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tcpips{display:flex;gap:2px;flex-wrap:wrap;margin-top:5px;}
.pip{width:7px;height:7px;border-radius:50%;}
.pip.f{background:#4caf50;}
.pip.b{background:#e53935;}
.tcal-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 16px;border-top:1px solid var(--border);background:#fff;}
.tleg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);}
.tleg-d{width:10px;height:10px;border-radius:50%;}

/* Admin bars & PIN controls */
.tcal-adminbar{display:none;align-items:center;justify-content:space-between;padding:8px 16px;background:#fff8e1;border-bottom:1px solid #ffe082;font-size:13px;color:#795548;}
.tcal-adminbar.on{display:flex;}
.tcal-adminbar button{font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #ffe082;background:#fff;cursor:pointer;color:#795548;}
.tcal-pinbar{display:none;align-items:center;gap:8px;background:var(--bg-surface);border-radius:10px;padding:10px 14px;margin-bottom:1.25rem;}
.tcal-pinbar.on{display:flex !important;}
.tcal-pinbar input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:14px;outline:none;}
.tcal-pinbar button{padding:8px 16px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;cursor:pointer;}
.tcal-pinerr{font-size:12px;color:var(--red);margin-top:4px;display:none;}

/* MODAL STYLES */
.tcal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9000;align-items:center;justify-content:center;padding:1rem;}
.tcal-overlay.on{display:flex;}
.tcal-modal{background:#fff;border-radius:16px;width:min(95vw,460px);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mpop .18s ease;}
@keyframes mpop{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.tcal-mhead{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;}
.tcal-mhead h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--text);}
.tcal-mclose{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;}
.tcal-mbody{padding:1.25rem 1.5rem 1.5rem;}
.tcal-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tslot{border-radius:12px;padding:14px;border:1.5px solid #e0e0e0;background:#f9f9f9;display:flex;flex-direction:column;gap:3px;}
.tslot.f{border-color:#a5d6a7;background:#f1f8f1;}
.tslot.b{border-color:#ef9a9a;background:#fdf2f2;}
.tslot-name{font-size:15px;font-weight:600;color:var(--text);}
.tslot-time{font-size:11px;color:var(--text-muted);}
.tslot-btn{display:block;margin-top:10px;text-align:center;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;color:#fff;border:none;cursor:pointer;}
.tslot-btn.book{background:var(--red);}
.tslot-btn.toggle{background:var(--text-muted);}

footer{background:#f8f0e8;border-top:4px solid #de1c24;padding:2.5rem 2rem;font-size:13px;}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-logo{font-size:15px;font-weight:700;color:#2d3748;}

@media(max-width:600px){
  .tcal-slots{grid-template-columns:1fr;}
  .tc{min-height:48px;padding:4px;}
  .tcn{font-size:11px;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Tokyo with <span>Terry</span></a>
  <a class="back-btn" href="index.html">&#8592; Back to main page</a>
</nav>

<section class="tcal-section" id="availability">
  <div class="container">
    <div class="section-label">Availability</div>
	<div class="tcal-adminbar" id="tcAdminBar">
      <span>Logged in as Admin</span>
      <button onclick="TC.lock()">Lock Panels</button>
    </div>  
    <div class="tcal-bar">
      <div class="tcal-month" id="tcMonthLabel">Month Year</div>
      <div class="tcal-nav">
        <button class="tcal-navbtn" onclick="TC.nav(-1)">&#8592;</button>
        <button class="tcal-navbtn" onclick="TC.nav(1)">&#8594;</button>
      </div>
    </div>

   <div class="tcal-pinbar" id="tcPinBar">
  <input type="password" id="tcPinInput" placeholder="Admin PIN">
  <button onclick="TC.pin()">Unlock</button>
  <div class="tcal-pinerr" id="tcPinErr" style="display:none; color:red;">Invalid PIN</div>
</div>
    <div class="tcal-wrap">
      <div class="tcal-dow">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="tcal-grid" id="tcGrid"></div>
    </div>
  </div>
</section>

<div class="tcal-overlay" id="tcOverlay" onclick="if(event.target===this) TC.close()">
  <div class="tcal-modal" id="tcModal">
    <div class="tcal-mhead">
      <h2 id="tcMTitle"></h2>
      <button class="tcal-mclose" onclick="TC.close()">&#10005;</button>
    </div>
    <div class="tcal-mbody" id="tcMBody"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-left">
      <div class="footer-logo">空き状況 · Availability</div>
      <div class="footer-desc">Check dates &amp; book · Tokyo Private Tours with Terry</div>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="reservations.html">Reserve</a>
    </div>
  </div>
</footer>

<script>
// Logic for calendar rendering and status management
!function(){
  var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var SLOTS=[
    {id:'full', n:'Full Day', t:'All day', i:'🗾'},
    {id:'morning', n:'Morning', t:'8am – 12pm', i:'🌅'},
    {id:'afternoon', n:'Afternoon', t:'12pm – 5pm', i:'☀️'},
    {id:'evening', n:'Evening', t:'5pm – 9pm', i:'🌆'}
  ];
  var PIN='1994';
  
  var D = JSON.parse(localStorage.getItem('terry_availability_slots')) || {};
  var today = new Date();
  var currentYear = today.getFullYear();
  var currentMonth = today.getMonth();
  var isAdminMode = false;

  var JP_HOLIDAYS = {
    '1-1':'New Year','1-2':'Holiday','1-3':'Holiday','2-11':'Nat. Found','2-23':'Emperor BD',
    '4-29':'Showa Day','5-3':'Const. Day','5-4':'Greenery','5-5':'Children','11-3':'Culture',
    '11-23':'Labor Day'
  };

  function getFormatKey(year, month, day) {
    return year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
  }

  function renderCalendarGrid() {
    var grid = document.getElementById('tcGrid');
    var label = document.getElementById('tcMonthLabel');
    if(!grid || !label) return;
    
    grid.innerHTML = '';
    label.innerText = MONTHS[currentMonth] + ' ' + currentYear;

    var firstDayIdx = new Date(currentYear, currentMonth, 1).getDay();
    var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    var daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
    var todayKey = getFormatKey(today.getFullYear(), today.getMonth(), today.getDate());

    for (var i = firstDayIdx - 1; i >= 0; i--) {
      var d = daysInPrevMonth - i;
      var cell = document.createElement('div');
      cell.className = 'tc dim';
      cell.innerHTML = '<span class="tcn">' + d + '</span>';
      grid.appendChild(cell);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var cell = document.createElement('div');
      var dateKey = getFormatKey(currentYear, currentMonth, d);
      
      if (!D[dateKey]) { D[dateKey] = { full: 'f', morning: 'f', afternoon: 'f', evening: 'f' }; }

      var dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
      var checkPast = new Date(currentYear, currentMonth, d).setHours(0,0,0,0) < new Date().setHours(0,0,0,0);
      var publicHoliday = JP_HOLIDAYS[(currentMonth + 1) + '-' + d] || null;

      var dynamicClasses = ['tc', 'clickable'];
      if (dayOfWeek === 0) dynamicClasses.push('sun');
      if (dayOfWeek === 6) dynamicClasses.push('sat');
      if (dateKey === todayKey) dynamicClasses.push('istoday');
      if (publicHoliday) dynamicClasses.push('ishol');
      if (checkPast && !isAdminMode) dynamicClasses.push('past');

      cell.className = dynamicClasses.join(' ');
      var cellInner = '<span class="tcn">' + d + '</span>';
      if (publicHoliday) { cellInner += '<span class="tchn">' + publicHoliday + '</span>'; }

      cellInner += '<div class="tcpips">';
      SLOTS.forEach(function(s) {
        var status = D[dateKey][s.id] || 'f';
        cellInner += '<div class="pip ' + status + '"></div>';
      });
      cellInner += '</div>';
      cell.innerHTML = cellInner;

      (function(boundKey, boundTitle, isDayPast){
        cell.onclick = function() {
          if (isDayPast && !isAdminMode) return;
          TC.open(boundKey, boundTitle);
        };
      })(dateKey, MONTHS[currentMonth] + ' ' + d + ', ' + currentYear, checkPast);

      grid.appendChild(cell);
    }

    var accumulatedCells = firstDayIdx + daysInMonth;
    var finalPaddingCells = (7 - (accumulatedCells % 7)) % 7;
    for (var i = 1; i <= finalPaddingCells; i++) {
      var cell = document.createElement('div');
      cell.className = 'tc dim';
      cell.innerHTML = '<span class="tcn">' + i + '</span>';
      grid.appendChild(cell);
    }
  }

  window.TC = {
    nav: function(dir) {
      currentMonth += dir;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; } 
      else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendarGrid();
    },

    pin: function() {
      var passInput = document.getElementById('tcPinInput');
      var errLabel = document.getElementById('tcPinErr');
      if (passInput.value === PIN) {
        isAdminMode = true;
        errLabel.style.display = 'none';
        document.getElementById('tcPinBar').classList.remove('on');
        document.getElementById('tcAdminBar').classList.add('on');
        passInput.value = '';
        renderCalendarGrid();
      } else {
        errLabel.style.display = 'block';
      }
    },

    lock: function() {
      isAdminMode = false;
      document.getElementById('tcAdminBar').classList.remove('on');
      renderCalendarGrid();
    },

    open: function(key, displayTitle) {
      document.getElementById('tcMTitle').innerText = displayTitle;
      var containerBody = document.getElementById('tcMBody');
      containerBody.innerHTML = '';
      var interactiveGrid = document.createElement('div');
      interactiveGrid.className = 'tcal-slots';

      SLOTS.forEach(function(slotObj) {
        var currentStatus = D[key][slotObj.id] || 'f';
        var slotCard = document.createElement('div');
        slotCard.className = 'tslot ' + currentStatus;

        var cardContent = '<span class="tslot-name">' + slotObj.i + ' ' + slotObj.n + '</span>' +
                          '<span class="tslot-time">' + slotObj.t + '</span>';

        if (isAdminMode) {
          var btnLabel = (currentStatus === 'f') ? 'Mark Busy' : 'Make Free';
          cardContent += '<button class="tslot-btn admin-toggle">' + btnLabel + '</button>';
          slotCard.innerHTML = cardContent;
          slotCard.querySelector('button').onclick = function() {
            D[key][slotObj.id] = (currentStatus === 'f') ? 'b' : 'f';
            localStorage.setItem('terry_availability_slots', JSON.stringify(D));
            TC.open(key, displayTitle);
            renderCalendarGrid();
          };
        } else {
          if (currentStatus === 'f') {
            cardContent += '<a href="reservations.html?date=' + encodeURIComponent(key) + '&slot=' + encodeURIComponent(slotObj.id) + '" class="tslot-btn book">Book Slot</a>';
          } else {
            cardContent += '<span class="tslot-btn" style="background:#ccc; color:#777; cursor:not-allowed;">Booked Out</span>';
          }
          slotCard.innerHTML = cardContent;
        }
        interactiveGrid.appendChild(slotCard);
      });
      containerBody.appendChild(interactiveGrid);
      document.getElementById('tcOverlay').classList.add('on');
    },

    close: function() { document.getElementById('tcOverlay').classList.remove('on'); }
  };

  // Secret Key Trigger: Press 'L' to show/hide the PIN bar
  document.addEventListener('keydown', function(e) {
    if (e.key.toLowerCase() === 'l') {
      document.getElementById('tcPinBar').classList.toggle('on');
    }
  });

  renderCalendarGrid();
}();
</script>

</body>
</html>
